[build]
  command = "node node_modules/next/dist/bin/next build --webpack"
  publish = "out"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

[[redirects]]
  from = "/app/settings/__next.app.settings.__PAGE__.txt"
  to = "/app/settings/__next.app.settings/__PAGE__.txt"
  status = 200

[[redirects]]
  from = "/app/tenders/__next.app.tenders.__PAGE__.txt"
  to = "/app/tenders/__next.app.tenders/__PAGE__.txt"
  status = 200

[[redirects]]
  from = "/app/kanban/__next.app.kanban.__PAGE__.txt"
  to = "/app/kanban/__next.app.kanban/__PAGE__.txt"
  status = 200

[[redirects]]
  from = "/tenders"
  to = "/app/tenders"
  status = 301

[[redirects]]
  from = "/tenders/*"
  to = "/app/tenders/:splat"
  status = 301

[[redirects]]
  from = "/analytics"
  to = "/app/insights"
  status = 301

[[redirects]]
  from = "/analytics/*"
  to = "/app/insights/:splat"
  status = 301

[[redirects]]
  from = "/active-bids"
  to = "/app/kanban"
  status = 301

[[redirects]]
  from = "/active-bids/*"
  to = "/app/kanban/:splat"
  status = 301

[[redirects]]
  from = "/app/active-bids"
  to = "/app/kanban"
  status = 301

[[redirects]]
  from = "/app/active-bids/*"
  to = "/app/kanban/:splat"
  status = 301

[[redirects]]
  from = "/kanban"
  to = "/app/kanban"
  status = 301

[[redirects]]
  from = "/kanban/*"
  to = "/app/kanban/:splat"
  status = 301

[[redirects]]
  from = "/settings"
  to = "/app/settings"
  status = 301

[[redirects]]
  from = "/settings/*"
  to = "/app/settings/:splat"
  status = 301

[[redirects]]
  from = "/accept-invite/__next.accept-invite.__PAGE__.txt"
  to = "/accept-invite/__next.accept-invite/__PAGE__.txt"
  status = 200
